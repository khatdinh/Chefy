<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChefCraft</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="site-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">ChefCraft</p>
          <h1 class="brand-title">Recipe Studio</h1>
        </div>
        <div class="topbar-meta">
          <span>Metric recipes</span>
          <span id="status" class="status">Ready</span>
        </div>
      </header>

      <div class="workspace">
        <section class="panel input-panel" aria-labelledby="app-title">
          <div class="section-heading">
            <p class="eyebrow">Prompt</p>
            <h2 id="app-title">What are we cooking?</h2>
          </div>

          <form id="recipe-form" class="recipe-form">
            <label for="prompt">Dish brief</label>
            <textarea
              id="prompt"
              name="prompt"
              rows="8"
              placeholder="Scallops with white wine sauce, serves 2, quick but elegant"
              required
            ></textarea>

            <div class="prompt-chips" aria-label="Example prompts">
              <button type="button" class="chip" data-prompt="Creamy carbonara, serves 4, traditional style">Carbonara</button>
              <button type="button" class="chip" data-prompt="Weeknight chicken thighs with pan sauce, serves 2">Chicken thighs</button>
              <button type="button" class="chip" data-prompt="Vegetarian mushroom risotto, restaurant finish">Mushroom risotto</button>
            </div>

            <div class="controls">
              <button id="submit-button" type="submit">Create Recipe</button>
              <button id="clear-button" type="button" class="secondary">Clear</button>
            </div>
          </form>
        </section>

        <section class="panel output-panel" aria-live="polite">
          <div class="output-header">
            <div>
              <p class="eyebrow">Output</p>
              <h2>Recipe</h2>
            </div>
          </div>
          <article id="recipe-output" class="recipe-output">
            <div class="empty-state">
              <p class="empty-title">Ready for the brief.</p>
              <p class="placeholder">Add a dish, ingredients, timing, or style and ChefCraft will build the recipe.</p>
            </div>
          </article>
        </section>
      </div>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
